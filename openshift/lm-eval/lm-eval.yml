# ── Configuration ─────────────────────────────────────────────────────
# To switch models, update the fields marked with ✎ below:
#   1. metadata.name          (Job + label)
#   2. MODEL_ID / MODEL       (in each container script)
#   3. QUANTIZATION            (in the benchmark script)
#   4. TP / DP                 (in the vllm-server script)
#
# The example below uses Qwen3-8B on a single GPU. Adjust GPU count,
# TP/DP, and tier1 storage when serving larger models.
# ──────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  # ✎ Change suffix to match your model/quantization
  name: mlr-vllm-<YOUR_NAME>-lm-eval
  namespace: machine-learning
  labels:
    app.kubernetes.io/instance: mlr-vllm-<YOUR_NAME>-lm-eval
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: mlr-vllm-<YOUR_NAME>-lm-eval
    spec:
      restartPolicy: Never
      serviceAccountName: ml-workload
      securityContext:
        fsGroup: 1000760000
        fsGroupChangePolicy: Always
      nodeSelector:
        node-role.kubernetes.io/up-h100mcp: ""
      initContainers:
      - name: vllm-server
        restartPolicy: Always
        image: vllm/vllm-openai:v0.22.1
        securityContext:
          runAsUser: 0
        command:
          - /bin/bash
          - -c
          - |
            set -e

            # ✎ Model to serve
            MODEL_ID="Qwen/Qwen3-8B"
            # ✎ Parallelism — adjust to model size
            TP=1
            DP=1

            export HF_HOME="/tier2/hf-hub"
            export HF_HUB_CACHE="/tier2/hf-hub"
            export OMP_NUM_THREADS=1
            export MKL_NUM_THREADS=1
            export OPENBLAS_NUM_THREADS=1
            export NUMEXPR_NUM_THREADS=1
            export VLLM_WORKER_MULTIPROC_METHOD=spawn

            mkdir -p "$HF_HOME"

            LOCAL_MODEL="/tier1/model"

            echo "[*] Resolving model in tier2 HF cache..."
            CACHE_PATH=$(python3 -c "
            from huggingface_hub import snapshot_download
            print(snapshot_download('${MODEL_ID}'))
            ")
            echo "[+] Cached at: ${CACHE_PATH}"

            echo "[*] Copying model to tier1 NVMe..."
            cp -rL "$CACHE_PATH" "$LOCAL_MODEL"
            echo "[+] Model copied to ${LOCAL_MODEL}"

            echo "========================================================="
            echo " Starting vLLM Server: ${MODEL_ID}                       "
            echo " TP=${TP}, DP=${DP}                                      "
            echo "========================================================="

            exec vllm serve "$LOCAL_MODEL" \
                --served-model-name "$MODEL_ID" \
                --tensor-parallel-size ${TP} \
                --data-parallel-size ${DP} \
                --port 8000
        resources:
          requests:
            nvidia.com/gpu: 1
          limits:
            nvidia.com/gpu: 1
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: mlr-<YOUR_NAME>-hf-token-read-only
              key: HF_TOKEN
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,utility
        - name: RAYON_NUM_THREADS
          value: "1"
        - name: VLLM_ENGINE_READY_TIMEOUT_S
          value: "1800"
        volumeMounts:
        - name: tier1
          mountPath: /tier1
        - name: tier2
          mountPath: /tier2
        envFrom:
        - configMapRef:
            name: ceph-bucket-class
        - secretRef:
            name: ceph-bucket-class
      containers:
      - name: benchmark
        image: python:3.12-slim
        securityContext:
          runAsUser: 0
        command:
          - /bin/bash
          - -c
          - |
            set -e

            # ✎ Benchmark configuration
            MODEL="Qwen/Qwen3-8B"
            QUANTIZATION="bf16"

            apt-get update && apt-get install -y --no-install-recommends curl git

            export HF_HOME="/tier2/hf-hub"
            export HF_HUB_CACHE="/tier2/hf-hub"
            SERVER_URL="http://localhost:8000"

            RUN_TS=$(date -u +%Y%m%d-%H%M%S)
            START_EPOCH=$(date +%s)
            RESULT_DIR="/tier2/benchmark_results/${RUN_TS}"
            mkdir -p "$HF_HOME" "$RESULT_DIR"

            echo "========================================================="
            echo " lm-eval Benchmark — run ${RUN_TS}                       "
            echo " Model: ${MODEL} (${QUANTIZATION})                       "
            echo "========================================================="

            # Install lm-eval from neuralmagic fork (has mmlu_pro_chat task)
            pip install -q "lm_eval[api,ifeval] @ git+https://github.com/neuralmagic/lm-evaluation-harness.git@mmlu-pro-chat-variant" langdetect

            # Wait for the vLLM server to become healthy
            echo "[*] Waiting for vLLM server at ${SERVER_URL} ..."
            until curl -sf "${SERVER_URL}/v1/models" > /dev/null 2>&1; do
                echo "[*] Server not ready yet, retrying in 15s..."
                sleep 15
            done
            echo "[+] vLLM Server is UP and healthy!"

            # Collect server info for config.json
            SERVER_VERSION=$(curl -sf "${SERVER_URL}/version" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
            SERVER_MODELS=$(curl -sf "${SERVER_URL}/v1/models")
            HARNESS_VERSION=$(pip show lm_eval 2>/dev/null | grep '^Version:' | awk '{print $2}')

            echo "[+] Server vLLM version: ${SERVER_VERSION}"
            echo "[+] lm-eval version: ${HARNESS_VERSION}"

            # Write config.json
            python3 -c "
            import json
            config = {
                'benchmark_type': 'lm-eval',
                'spec_decode_method': None,
                'target_model': '${MODEL}',
                'draft_model': None,
                'quantization': '${QUANTIZATION}',
                'run_timestamp': '${RUN_TS}',
                'server': {
                    'vllm_version': '${SERVER_VERSION}',
                    'url': '${SERVER_URL}',
                    'image': 'vllm/vllm-openai:v0.22.1',
                    'model': '${MODEL}',
                    'max_model_len': None,
                    'models_endpoint': json.loads('''${SERVER_MODELS}'''),
                },
                'client': {
                    'harness': 'lm-eval',
                    'harness_version': '${HARNESS_VERSION}',
                    'harness_source': 'neuralmagic/lm-evaluation-harness@mmlu-pro-chat-variant',
                    'image': 'python:3.12-slim',
                },
                'benchmark': {
                    'tasks': {
                        'gsm8k_platinum_cot_llama': {'num_fewshot': 0},
                        'mmlu_pro_chat': {'num_fewshot': 0},
                        'mmlu_cot_llama': {'num_fewshot': 5},
                        'ifeval': {'num_fewshot': 0},
                    },
                    'seeds': [0, 1, 2],
                    'generation_kwargs': {
                        'temperature': 0.6,
                        'top_p': 0.95,
                        'max_gen_toks': 32768,
                    },
                },
            }
            with open('${RESULT_DIR}/config.json', 'w') as f:
                json.dump(config, f, indent=2)
            "
            echo "[+] config.json written to ${RESULT_DIR}/config.json"

            # ---- Benchmark sweep ----
            SEEDS=(0 1 2)
            MODEL_ARGS="model=${MODEL},max_length=32768,base_url=http://localhost:8000/v1/chat/completions,num_concurrent=64,max_retries=3,tokenized_requests=False,tokenizer_backend=None,timeout=3600"
            GEN_KWARGS_BASE="do_sample=True,temperature=0.6,top_p=0.95,max_gen_toks=32768"

            LIMIT_ARG=""
            if [ -n "${LIMIT:-}" ]; then
                echo "[*] Limiting to ${LIMIT} samples per task"
                LIMIT_ARG="--limit ${LIMIT}"
            fi

            # 0-shot tasks
            TASKS_0SHOT=("gsm8k_platinum_cot_llama" "mmlu_pro_chat" "ifeval")

            for SEED in "${SEEDS[@]}"; do
                for TASK in "${TASKS_0SHOT[@]}"; do
                    echo "---------------------------------------------------------"
                    echo " Executing: ${TASK} (0-shot, seed=${SEED})               "
                    echo "---------------------------------------------------------"
                    lm_eval --model local-chat-completions \
                        --tasks "$TASK" \
                        --model_args "$MODEL_ARGS" \
                        --num_fewshot 0 \
                        --apply_chat_template \
                        --output_path "${RESULT_DIR}/${TASK}_seed${SEED}" \
                        --seed "$SEED" \
                        --gen_kwargs "${GEN_KWARGS_BASE},seed=${SEED}" \
                        $LIMIT_ARG
                    echo "[+] Completed: ${TASK} (seed=${SEED})"
                done

                # 5-shot task
                echo "---------------------------------------------------------"
                echo " Executing: mmlu_cot_llama (5-shot, seed=${SEED})        "
                echo "---------------------------------------------------------"
                lm_eval --model local-chat-completions \
                    --tasks mmlu_cot_llama \
                    --model_args "$MODEL_ARGS" \
                    --num_fewshot 5 \
                    --apply_chat_template \
                    --fewshot_as_multiturn \
                    --output_path "${RESULT_DIR}/mmlu_cot_llama_seed${SEED}" \
                    --seed "$SEED" \
                    --gen_kwargs "${GEN_KWARGS_BASE},seed=${SEED}" \
                    $LIMIT_ARG
                echo "[+] Completed: mmlu_cot_llama (seed=${SEED})"
            done

            # Write run-metadata.json — presence of this file = successful run
            END_TS=$(date -u +%Y%m%d-%H%M%S)
            END_EPOCH=$(date +%s)
            DURATION_S=$((END_EPOCH - START_EPOCH))
            RESULT_FILES=$(find "$RESULT_DIR" -mindepth 1 -maxdepth 1 ! -name 'config.json' ! -name 'run-metadata.json' | wc -l | tr -d ' ')

            python3 -c "
            import json
            metadata = {
                'status': 'completed',
                'start_timestamp': '${RUN_TS}',
                'end_timestamp': '${END_TS}',
                'duration_seconds': ${DURATION_S},
                'result_files_written': ${RESULT_FILES},
            }
            with open('${RESULT_DIR}/run-metadata.json', 'w') as f:
                json.dump(metadata, f, indent=2)
            "

            echo "========================================================="
            echo " Sweep Complete! Results saved to ${RESULT_DIR}          "
            echo "========================================================="
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: mlr-<YOUR_NAME>-hf-token-read-only
              key: HF_TOKEN
        - name: OPENBLAS_NUM_THREADS
          value: "1"
        - name: RAYON_NUM_THREADS
          value: "1"
        volumeMounts:
        - name: tier2
          mountPath: /tier2
        envFrom:
        - configMapRef:
            name: ceph-bucket-class
        - secretRef:
            name: ceph-bucket-class
      volumes:
      - name: tier1
        ephemeral:
          volumeClaimTemplate:
            metadata:
              labels:
                type: ephemeral-volume
            spec:
              accessModes:
              - ReadWriteOnce
              storageClassName: lvms-h100-tier1-storage
              resources:
                requests:
                  storage: 50Gi
      - name: tier2
        persistentVolumeClaim:
          claimName: mlr-tier2-<YOUR_NAME>
